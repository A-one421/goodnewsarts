        // ----- CRS BANK (100+ questions) -----

        // ----- SHUFFLE & SELECT (always picks random subset from large bank) -----
        function shuffleAndSelect(bank, needed) {
          const shuffled = [...bank];
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          return shuffled.slice(0, needed);
        }

        let currentSubject = "english",
          currentQuestions = [],
          userAnswers = [],
          currentIndex = 0,
          timerInterval,
          timeLeft = 2 * 60 * 60;
        const mainApp = document.getElementById("mainApp"),
          regModal = document.getElementById("registrationModal"),
          displayRegBadge = document.getElementById("displayRegBadge");

        document.getElementById("regForm").addEventListener("submit", (e) => {
          e.preventDefault();
          let name = document.getElementById("studentName").value.trim(),
            reg = document.getElementById("studentRegNo").value.trim();
          if (!name || !reg) return alert("All fields required");
          studentFullName = name;
          studentRegNumber = reg;
          displayRegBadge.textContent = `Reg: ${reg} | ${name.split(" ")[0]}`;
          regModal.style.display = "none";
          mainApp.style.display = "flex";
          loadSubject("english");
          timerInterval = setInterval(updateTimer, 1000);
        });

        function loadSubject(subject) {
          currentSubject = subject;
          if (subject === "english") {
            currentQuestions = shuffleAndSelect(fullEnglishBank, 60);
            document.getElementById("subjectTitle").innerText =
              "Use of English";
          } else if (subject === "literature") {
            currentQuestions = shuffleAndSelect(fullLiterature, 40);
            document.getElementById("subjectTitle").innerText =
              "Literature in English";
          } else if (subject === "government") {
            currentQuestions = shuffleAndSelect(fullGovernment, 40);
            document.getElementById("subjectTitle").innerText = "Government";
          } else {
            currentQuestions = shuffleAndSelect(fullCRS, 40);
            document.getElementById("subjectTitle").innerText =
              "Christian Religious Studies (CRS)";
          }
          userAnswers = new Array(currentQuestions.length).fill(null);
          currentIndex = 0;
          renderQuestion();
          renderQuestionGrid();
          updateAnsweredCount();
        }

        function renderQuestion() {
          const q = currentQuestions[currentIndex];
          if (!q) return;
          document.getElementById("questionCounter").innerHTML =
            `Question ${currentIndex + 1} of ${currentQuestions.length}`;
          document.getElementById("questionContainer").innerHTML =
            `<div class="space-y-6"><p class="text-xl leading-relaxed text-foreground font-medium">${q.text}</p><div class="space-y-3">${q.options.map((opt, idx) => `<label class="flex items-center gap-4 p-4 rounded-xl border ${userAnswers[currentIndex] === idx ? "border-primary bg-primary/5" : "border-border bg-card"} hover:border-primary/50 cursor-pointer"><input type="radio" name="option" value="${idx}" ${userAnswers[currentIndex] === idx ? "checked" : ""} class="w-5 h-5 accent-primary" onchange="window.selectAnswer(${idx})"><div class="flex items-center gap-3"><span class="w-8 h-8 flex items-center justify-center rounded-lg ${userAnswers[currentIndex] === idx ? "bg-primary text-primary-foreground" : "bg-muted text-foreground"} text-sm font-bold">${String.fromCharCode(65 + idx)}</span><span class="text-lg text-foreground">${opt}</span></div></label>`).join("")}</div></div>`;
        }
        window.selectAnswer = (idx) => {
          userAnswers[currentIndex] = idx;
          renderQuestion();
          renderQuestionGrid();
          updateAnsweredCount();
        };
        function renderQuestionGrid() {
          let html = "";
          for (let i = 0; i < currentQuestions.length; i++) {
            const isAnswered = userAnswers[i] !== null,
              isCurrent = i === currentIndex;
            let cls = isAnswered
              ? "bg-primary text-primary-foreground"
              : isCurrent
                ? "border-2 border-primary bg-card text-primary ring-2 ring-primary/20"
                : "bg-muted text-foreground border border-border";
            html += `<button onclick="window.goToQuestion(${i})" class="w-full aspect-square flex items-center justify-center rounded-lg font-bold text-sm shadow-sm ${cls}">${i + 1}</button>`;
          }
          document.getElementById("questionGrid").innerHTML = html;
        }
        window.goToQuestion = (i) => {
          currentIndex = i;
          renderQuestion();
        };
        function updateAnsweredCount() {
          document.getElementById("answeredCount").innerText =
            `${userAnswers.filter((a) => a !== null).length} / ${currentQuestions.length}`;
        }
        function calculateScore() {
          let correct = 0;
          for (let i = 0; i < currentQuestions.length; i++)
            if (
              userAnswers[i] !== null &&
              userAnswers[i] === currentQuestions[i].correct
            )
              correct++;
          return Math.round((correct / currentQuestions.length) * 400);
        }
        async function sendResultEmail(score, total, answered) {
          const templateParams = {
            student_name: studentFullName,
            registration_number: studentRegNumber,
            score,
            total_questions: total,
            answered,
            percentage: ((score / 400) * 100).toFixed(1) + "%",
            subject: currentSubject.toUpperCase(),
            time_submitted: new Date().toLocaleString(),
            name: studentFullName,
            reg_no: studentRegNumber,
            exam_score: score,
            max_score: 400,
            correct_answers: Math.round((score / 400) * total),
          };
          try {
            await emailjs.send(
              EMAILJS_SERVICE_ID,
              EMAILJS_TEMPLATE_ID,
              templateParams,
            );
            return true;
          } catch (e) {
            console.error(e);
            alert("Result saved locally, email not sent.");
            return false;
          }
        }
        async function submitQuiz() {
          if (
            !confirm("Submit exam? You cannot change answers after submission.")
          )
            return;
          clearInterval(timerInterval);
          const score = calculateScore(),
            answered = userAnswers.filter((a) => a !== null).length,
            total = currentQuestions.length;
          const btn = document.getElementById("submitBtn"),
            orig = btn.innerHTML;
          btn.innerHTML =
            "<iconify-icon icon='lucide:loader-circle' class='animate-spin'></iconify-icon> Sending...";
          btn.disabled = true;
          await sendResultEmail(score, total, answered);
          btn.innerHTML = orig;
          btn.disabled = false;
          alert(
            `✅ EXAM SUBMITTED!\n\nStudent: ${studentFullName} (${studentRegNumber})\nScore: ${score}/400\nAnswered: ${answered}/${total}\nPercentage: ${((score / 400) * 100).toFixed(1)}%\nResult sent to administrator.`,
          );
          document.getElementById("nextBtn").disabled = true;
          document.getElementById("prevBtn").disabled = true;
          document
            .querySelectorAll(".subject-tab")
            .forEach((btn) => (btn.disabled = true));
        }
        function updateTimer() {
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            submitQuiz();
            return;
          }
          const h = Math.floor(timeLeft / 3600),
            m = Math.floor((timeLeft % 3600) / 60),
            s = timeLeft % 60;
          document.getElementById("timer").innerHTML =
            `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
          timeLeft--;
        }
        document.querySelectorAll(".subject-tab").forEach((btn) =>
          btn.addEventListener("click", function () {
            document.querySelectorAll(".subject-tab").forEach((b) => {
              b.classList.remove("bg-primary", "text-primary-foreground");
              b.classList.add("text-muted-foreground");
            });
            this.classList.add("bg-primary", "text-primary-foreground");
            this.classList.remove("text-muted-foreground");
            loadSubject(this.dataset.subject);
          }),
        );
        document.getElementById("nextBtn").addEventListener("click", () => {
          if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            renderQuestion();
          } else alert("Last question reached");
        });
        document.getElementById("prevBtn").addEventListener("click", () => {
          if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
          } else alert("First question");
        });
        document
          .getElementById("submitBtn")
          .addEventListener("click", submitQuiz);

        const calcModal = document.getElementById("calculatorModal"),
          calcInput = document.getElementById("calcInput");
        let calcValue = "0";
        function updateCalc() {
          calcInput.value = calcValue;
        }
        document
          .getElementById("openCalculator")
          .addEventListener("click", () => calcModal.classList.add("active"));
        document
          .getElementById("floatingCalcBtn")
          .addEventListener("click", () => calcModal.classList.add("active"));
        document
          .getElementById("closeCalculator")
          .addEventListener("click", () =>
            calcModal.classList.remove("active"),
          );
        document.querySelectorAll(".calc-btn").forEach((btn) =>
          btn.addEventListener("click", (e) => {
            const val = e.target.innerText;
            if (val === "C") calcValue = "0";
            else if (val === "=") {
              try {
                calcValue = eval(calcValue).toString();
              } catch {
                calcValue = "Error";
              }
            } else if (val === "⌫") calcValue = calcValue.slice(0, -1) || "0";
            else {
              if (calcValue === "0" && !isNaN(val)) calcValue = val;
              else calcValue += val;
            }
            updateCalc();
          }),
        );
      })();
